admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: admin-password

persistence:
  enabled: true

initChownData:
  enabled: false

datasources:
  datasources.yaml:
    apiVersion: 1
    # Remove any pre-existing (auto-uid) Prometheus datasource first so the
    # fixed uid below can be (re)applied cleanly. Without this, changing the
    # uid of an already-persisted datasource crashes Grafana provisioning with
    # "data source not found" (persistence.enabled keeps the old row around).
    deleteDatasources:
      - name: Prometheus
        orgId: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus-server
        isDefault: true

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: platform
        orgId: 1
        folder: Platform
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/platform

dashboards:
  platform:
    platform-services-overview:
      file: dashboards/platform-services-overview.json
    platform-service-detail:
      file: dashboards/platform-service-detail.json
